<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alchemist" />
  <meta name="theme-color" content="#0D4A4A" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>The Alchemist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #0D4A4A;
    }
    #root { height: 100%; }
    input, button { font-family: 'Georgia', 'Times New Roman', serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

    /* ── MOBILE (app-like) ── */
    @media (max-width: 599px) {
      body { background: #0D4A4A; }
      #root { height: 100%; }
      .alc-bottom-nav {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        transform: none !important;
        width: 100% !important;
        max-width: 100% !important;
      }
      .alc-app {
        max-width: 100% !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
      }
    }

    /* ── DESKTOP (full-width site) ── */
    @media (min-width: 600px) {
      body {
        background: linear-gradient(135deg, #0D1F40 0%, #0D4A4A 50%, #6B3318 100%);
        min-height: 100vh;
      }
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .alc-app {
        max-width: 100% !important;
        min-height: 100vh !important;
        border-radius: 0 !important;
      }
      .alc-bottom-nav {
        position: sticky !important;
        bottom: 0 !important;
        left: auto !important;
        transform: none !important;
        width: 100% !important;
        max-width: 100% !important;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ── RESPONSIVE HOOK ──
function useIsDesktop() {
  const [isDesktop, setIsDesktop] = useState(window.innerWidth >= 600);
  useEffect(() => {
    const handler = () => setIsDesktop(window.innerWidth >= 600);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return isDesktop;
}

// ── PER-TAB THEMES ──
const THEMES = {
  today: {
    bg: "#F5F0E8", primary: "#1A6B6B", primaryL: "#2A8B8B", primaryD: "#0D4A4A",
    accent: "#C9A84C", accentL: "#E8C96A", text: "#1A2A2A", textLight: "#4A6060",
    white: "#FFFFFF", border: "#D4C9B0", checkBg: "#E8F5F5",
    cardShadow: "rgba(26,107,107,0.08)",
    headerGrad: "linear-gradient(135deg,#0D4A4A 0%,#1A6B6B 100%)",
    navActive: "#1A6B6B",
  },
  weekly: {
    bg: "#F7F0E3", primary: "#A0522D", primaryL: "#C0703A", primaryD: "#6B3318",
    accent: "#D4A050", accentL: "#EFC070", text: "#2A1A0E", textLight: "#7A5A40",
    white: "#FFFAF4", border: "#E0C9A8", checkBg: "#FDF0DC",
    cardShadow: "rgba(160,82,45,0.08)",
    headerGrad: "linear-gradient(135deg,#6B3318 0%,#A0522D 100%)",
    navActive: "#A0522D",
  },
  stats: {
    bg: "#EEF2F8", primary: "#1E3A6E", primaryL: "#2E5090", primaryD: "#0F1F40",
    accent: "#5B8FD4", accentL: "#7AABE8", text: "#0F1F40", textLight: "#4A6080",
    white: "#FFFFFF", border: "#C8D4E8", checkBg: "#E0E8F8",
    cardShadow: "rgba(30,58,110,0.08)",
    headerGrad: "linear-gradient(135deg,#0F1F40 0%,#1E3A6E 100%)",
    navActive: "#1E3A6E",
  },
};

// ── PER-TAB QUOTES ──
const QUOTES = {
  today: [
    { text: "Wasting time is worse than death, for death separates you from this world, while wasting time separates you from Allah.", author: "Ibn Qayyim" },
    { text: "The heart will rest and feel relief if it is settled with Allah.", author: "Ibn Qayyim" },
    { text: "Make use of five before five: your youth before old age, your health before sickness, your wealth before poverty, your free time before being busy, and your life before death.", author: "Ibn Abbas" },
  ],
  weekly: [
    { text: "Patience is of three types: patience in worship, patience from sin, and patience with what Allah decrees.", author: "Ibn Qayyim" },
    { text: "Whoever desires everlasting bliss, let him remain firmly in the threshold of servitude.", author: "Ibn Taymiyyah" },
    { text: "The more the servant loves his Master, the less he loves other than Him.", author: "Ibn Qayyim" },
  ],
  stats: [
    { text: "Knowledge is not what is memorized, but what benefits.", author: "Ibn Taymiyyah" },
    { text: "The greatest punishment is the hardening of the heart and its distance from Allah.", author: "Ibn Taymiyyah" },
    { text: "Every day that passes without remembrance of Allah is a loss that cannot be recovered.", author: "Ibn Qayyim" },
  ],
};

const DEFAULT_HABITS = [
  { id: 1, name: "Fajr / Prayer", emoji: "🕌" },
  { id: 2, name: "Gym", emoji: "💪" },
  { id: 3, name: "Cold Shower", emoji: "🚿" },
  { id: 4, name: "Read / Learn", emoji: "📖" },
  { id: 5, name: "Arabic Study", emoji: "📿" },
  { id: 6, name: "Python / Coding", emoji: "💻" },
  { id: 7, name: "School", emoji: "🎓" },
  { id: 8, name: "Hobby", emoji: "🎯" },
];

const WDAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS_S = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_F = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function dayKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function weekDates(ref) {
  const d = new Date(ref);
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  return Array.from({length:7},(_,i)=>{const dd=new Date(monday);dd.setDate(monday.getDate()+i);return dd;});
}

function monthDates(y, m) {
  const last = new Date(y, m+1, 0);
  return Array.from({length:last.getDate()},(_,i)=>new Date(y,m,i+1));
}

function Ring({pct, size, stroke, color, bg}) {
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const off = circ-(pct/100)*circ;
  return (
    <div style={{position:"relative",width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.5s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:size*0.22,fontWeight:"bold",color}}>{pct}%</div>
    </div>
  );
}

function App() {
  const today = new Date();
  const isDesktop = useIsDesktop();
  const [tab, setTab] = useState("today");
  const [habits, setHabits] = useState(DEFAULT_HABITS);
  const [checked, setChecked] = useState({});
  const [weekTasks, setWeekTasks] = useState({});
  const [quoteIdx] = useState({today:0,weekly:0,stats:0});
  const [weekRef, setWeekRef] = useState(today);
  const [statsMonth, setStatsMonth] = useState({y:today.getFullYear(),m:today.getMonth()});
  const [addingHabit, setAddingHabit] = useState(false);
  const [newName, setNewName] = useState("");
  const [newEmoji, setNewEmoji] = useState("⭐");
  const [taskInputs, setTaskInputs] = useState({});
  const [addingDay, setAddingDay] = useState(null);

  useEffect(()=>{
    try {
      const c=localStorage.getItem("alc_checked");
      const h=localStorage.getItem("alc_habits");
      const w=localStorage.getItem("alc_weektasks");
      if(c)setChecked(JSON.parse(c));
      if(h)setHabits(JSON.parse(h));
      if(w)setWeekTasks(JSON.parse(w));
    }catch{}
  },[]);

  useEffect(()=>{localStorage.setItem("alc_checked",JSON.stringify(checked));},[checked]);
  useEffect(()=>{localStorage.setItem("alc_habits",JSON.stringify(habits));},[habits]);
  useEffect(()=>{localStorage.setItem("alc_weektasks",JSON.stringify(weekTasks));},[weekTasks]);

  const toggleHabit=(id,date)=>{
    const k=dayKey(date);
    setChecked(p=>({...p,[k]:{...(p[k]||{}),[id]:!(p[k]?.[id])}}));
  };

  const dayProgress=(date)=>{
    const k=dayKey(date);
    const done=habits.filter(h=>checked[k]?.[h.id]).length;
    return {done,total:habits.length,pct:habits.length?Math.round((done/habits.length)*100):0};
  };

  const streak=(id)=>{
    let s=0,d=new Date(today);
    while(true){if(checked[dayKey(d)]?.[id]){s++;d.setDate(d.getDate()-1);}else break;}
    return s;
  };

  const addHabit=()=>{
    if(!newName.trim())return;
    setHabits(p=>[...p,{id:Date.now(),name:newName.trim(),emoji:newEmoji}]);
    setNewName("");setNewEmoji("⭐");setAddingHabit(false);
  };

  const addTask=(k)=>{
    const text=(taskInputs[k]||"").trim();
    if(!text)return;
    setWeekTasks(p=>({...p,[k]:[...(p[k]||[]),{id:Date.now(),text,done:false}]}));
    setTaskInputs(p=>({...p,[k]:""}));
    setAddingDay(null);
  };

  const toggleTask=(k,id)=>setWeekTasks(p=>({...p,[k]:(p[k]||[]).map(t=>t.id===id?{...t,done:!t.done}:t)}));
  const removeTask=(k,id)=>setWeekTasks(p=>({...p,[k]:(p[k]||[]).filter(t=>t.id!==id)}));

  const taskProg=(k)=>{
    const tasks=weekTasks[k]||[];
    if(!tasks.length)return null;
    const done=tasks.filter(t=>t.done).length;
    return {done,total:tasks.length,pct:Math.round((done/tasks.length)*100)};
  };

  const C = THEMES[tab];
  const quote = QUOTES[tab][quoteIdx[tab] % QUOTES[tab].length];
  const todayProg=dayProgress(today);
  const wDates=weekDates(weekRef);

  // ── Responsive sizes ──
  const contentMaxW = isDesktop ? 860 : "100%";
  const contentPad = isDesktop ? "24px 32px" : "14px";
  const weeklyPad = isDesktop ? "24px 20px" : "14px 8px";

  return (
    <div className="alc-app" style={{fontFamily:"'Georgia','Times New Roman',serif",background:C.bg,minHeight:"100vh",
      margin:"0 auto",display:"flex",flexDirection:"column",position:"relative",transition:"background 0.4s"}}>

      {/* HEADER */}
      <div style={{background:C.headerGrad,
        padding:"env(safe-area-inset-top, 24px) 20px 16px",paddingTop:"max(env(safe-area-inset-top),24px)",
        position:"relative",overflow:"hidden",transition:"background 0.4s"}}>
        <div style={{position:"absolute",inset:0,opacity:0.07}}>
          <svg width="100%" height="100%">
            <defs>
              <pattern id="geo" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                <polygon points="20,2 38,11 38,29 20,38 2,29 2,11" fill="none" stroke="#fff" strokeWidth="0.8"/>
                <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" fill="none" stroke="#fff" strokeWidth="0.5"/>
              </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#geo)"/>
          </svg>
        </div>
        <div style={{maxWidth:contentMaxW,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:4,position:"relative"}}>
            <span style={{fontSize:isDesktop?26:22,color:C.accentL}}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</span>
          </div>
          <div style={{textAlign:"center",position:"relative"}}>
            <div style={{fontSize:isDesktop?12:10,color:C.accentL,letterSpacing:4,textTransform:"uppercase"}}>The Alchemist</div>
            <div style={{fontSize:isDesktop?14:12,color:"rgba(255,255,255,0.7)"}}>
              {WDAYS[(today.getDay()+6)%7]}, {today.getDate()} {MONTHS_F[today.getMonth()]} {today.getFullYear()}
            </div>
          </div>
          <div style={{marginTop:10,background:"rgba(0,0,0,0.2)",borderRadius:8,padding:isDesktop?"10px 16px":"8px 12px",
            borderLeft:`3px solid ${C.accent}`,position:"relative",maxWidth:600,marginLeft:"auto",marginRight:"auto"}}>
            <div style={{fontSize:isDesktop?12:10,color:"rgba(255,255,255,0.9)",lineHeight:1.5,fontStyle:"italic"}}>"{quote.text}"</div>
            <div style={{fontSize:isDesktop?11:9,color:C.accentL,marginTop:3}}>— {quote.author}</div>
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div className="alc-scroll" style={{flex:1,overflowY:"auto",paddingBottom:isDesktop?20:80}}>

        {/* TODAY */}
        {tab==="today" && (
          <div style={{padding:contentPad,maxWidth:contentMaxW,margin:"0 auto",width:"100%"}}>
            <div style={{display:"flex",alignItems:"center",gap:isDesktop?18:14,marginBottom:isDesktop?20:16,background:C.white,
              borderRadius:14,padding:isDesktop?"16px 24px":"12px 16px",boxShadow:`0 2px 12px ${C.cardShadow}`}}>
              <Ring pct={todayProg.pct} size={isDesktop?72:60} stroke={isDesktop?8:7} color={C.primary} bg={C.checkBg}/>
              <div>
                <div style={{fontSize:isDesktop?20:16,fontWeight:"bold",color:C.primaryD}}>{todayProg.done} / {todayProg.total} done</div>
                <div style={{fontSize:isDesktop?13:11,color:C.textLight,marginTop:2}}>
                  {todayProg.pct===100?"🌟 Perfect day, masha'Allah!":todayProg.pct>=70?"Strong effort today":"Keep pushing forward"}
                </div>
              </div>
            </div>

            {/* Desktop: 2-column grid for habits */}
            <div style={{display:"grid",gridTemplateColumns:isDesktop?"1fr 1fr":"1fr",gap:isDesktop?10:7}}>
              {habits.map(h=>{
                const done=checked[dayKey(today)]?.[h.id]||false;
                const s=streak(h.id);
                return (
                  <div key={h.id} onClick={()=>toggleHabit(h.id,today)} style={{
                    display:"flex",alignItems:"center",gap:isDesktop?12:10,
                    background:done?`${C.primary}12`:C.white,
                    border:`1.5px solid ${done?C.primary:C.border}`,
                    borderRadius:11,padding:isDesktop?"13px 16px":"11px 12px",cursor:"pointer",
                    boxShadow:done?`0 2px 8px ${C.primary}18`:"0 1px 4px rgba(0,0,0,0.04)",
                    transition:"all 0.2s ease"}}>
                    <div style={{width:isDesktop?26:22,height:isDesktop?26:22,borderRadius:6,
                      border:`2px solid ${done?C.primary:C.border}`,
                      background:done?C.primary:"transparent",
                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                      transition:"all 0.2s ease"}}>
                      {done&&<span style={{color:"#fff",fontSize:isDesktop?14:12}}>✓</span>}
                    </div>
                    <span style={{fontSize:isDesktop?20:17}}>{h.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:isDesktop?15:13,fontWeight:"600",color:done?C.primary:C.text}}>{h.name}</div>
                      {s>0&&<div style={{fontSize:isDesktop?11:10,color:C.accent}}>🔥 {s} day streak</div>}
                    </div>
                    <button onClick={e=>{e.stopPropagation();setHabits(p=>p.filter(x=>x.id!==h.id));}}
                      style={{background:"none",border:"none",color:C.border,fontSize:isDesktop?18:16,cursor:"pointer",padding:"0 4px",
                        opacity:0.6,transition:"opacity 0.2s"}}
                      onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.6}>×</button>
                  </div>
                );
              })}
            </div>

            {addingHabit?(
              <div style={{marginTop:isDesktop?14:10,background:C.white,borderRadius:12,padding:isDesktop?16:12,
                border:`1.5px solid ${C.primary}`,maxWidth:isDesktop?420:"100%"}}>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <input value={newEmoji} onChange={e=>setNewEmoji(e.target.value)}
                    style={{width:42,textAlign:"center",fontSize:20,border:`1.5px solid ${C.border}`,
                      borderRadius:7,padding:"5px 2px",background:C.bg}}/>
                  <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Habit name..."
                    onKeyDown={e=>{if(e.key==="Enter")addHabit();if(e.key==="Escape")setAddingHabit(false);}}
                    style={{flex:1,fontSize:14,border:`1.5px solid ${C.border}`,borderRadius:7,
                      padding:"5px 9px",background:C.bg,fontFamily:"inherit"}}/>
                </div>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={addHabit} style={{flex:1,background:C.primary,color:"#fff",border:"none",
                    borderRadius:7,padding:"9px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Add Habit</button>
                  <button onClick={()=>setAddingHabit(false)} style={{flex:1,background:C.bg,color:C.textLight,
                    border:`1.5px solid ${C.border}`,borderRadius:7,padding:"9px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
                </div>
              </div>
            ):(
              <button onClick={()=>setAddingHabit(true)} style={{marginTop:isDesktop?14:10,width:isDesktop?"auto":"100%",
                background:"transparent",border:`1.5px dashed ${C.primary}`,color:C.primary,borderRadius:11,
                padding:isDesktop?"12px 32px":"11px",fontSize:isDesktop?13:12,cursor:"pointer",fontFamily:"inherit"}}>+ Add New Habit</button>
            )}
          </div>
        )}

        {/* WEEKLY */}
        {tab==="weekly" && (
          <div style={{padding:weeklyPad,maxWidth:isDesktop?1100:"100%",margin:"0 auto",width:"100%"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isDesktop?16:12,padding:"0 4px"}}>
              <button onClick={()=>{const d=new Date(weekRef);d.setDate(d.getDate()-7);setWeekRef(d);}}
                style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:isDesktop?"8px 16px":"6px 12px",cursor:"pointer",fontSize:isDesktop?18:16}}>‹</button>
              <span style={{fontSize:isDesktop?16:12,color:C.primaryD,fontWeight:"bold"}}>
                {wDates[0].getDate()} {MONTHS_S[wDates[0].getMonth()]} – {wDates[6].getDate()} {MONTHS_S[wDates[6].getMonth()]}
              </span>
              <button onClick={()=>{const d=new Date(weekRef);d.setDate(d.getDate()+7);setWeekRef(d);}}
                style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:isDesktop?"8px 16px":"6px 12px",cursor:"pointer",fontSize:isDesktop?18:16}}>›</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:isDesktop?8:4}}>
              {wDates.map((d,i)=>{
                const k=dayKey(d);
                const isToday=k===dayKey(today);
                const tasks=weekTasks[k]||[];
                const tp=taskProg(k);
                const isAdding=addingDay===k;
                return (
                  <div key={i} style={{background:isToday?`${C.primary}10`:C.white,
                    border:`1.5px solid ${isToday?C.primary:C.border}`,
                    borderRadius:isDesktop?12:10,display:"flex",flexDirection:"column",minHeight:isDesktop?260:180,overflow:"hidden"}}>
                    <div style={{background:isToday?C.primary:C.primaryD,padding:isDesktop?"8px 6px":"5px 3px",textAlign:"center"}}>
                      <div style={{fontSize:isDesktop?11:8,color:isToday?C.accentL:"rgba(255,255,255,0.65)",
                        textTransform:"uppercase",letterSpacing:0.3}}>{WDAYS[i]}</div>
                      <div style={{fontSize:isDesktop?16:12,fontWeight:"bold",color:"#fff"}}>{d.getDate()}</div>
                      {tp&&<div style={{fontSize:isDesktop?10:7,color:isToday?C.accentL:"rgba(255,255,255,0.55)"}}>{tp.pct}%</div>}
                    </div>
                    <div style={{flex:1,padding:isDesktop?"8px 6px 6px":"4px 3px 3px",display:"flex",flexDirection:"column",gap:isDesktop?4:2}}>
                      {tasks.map(t=>(
                        <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:isDesktop?4:2}}>
                          <div onClick={()=>toggleTask(k,t.id)} style={{width:isDesktop?16:11,height:isDesktop?16:11,borderRadius:isDesktop?3:2,flexShrink:0,marginTop:1,
                            border:`1.5px solid ${t.done?C.primary:C.border}`,background:t.done?C.primary:"transparent",
                            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {t.done&&<span style={{color:"#fff",fontSize:isDesktop?10:7,lineHeight:1}}>✓</span>}
                          </div>
                          <span style={{fontSize:isDesktop?12:8,lineHeight:1.35,color:t.done?C.primaryL:C.text,
                            textDecoration:t.done?"line-through":"none",flex:1,wordBreak:"break-word"}}>{t.text}</span>
                          <span onClick={()=>removeTask(k,t.id)} style={{fontSize:isDesktop?12:8,color:C.border,cursor:"pointer",flexShrink:0,paddingLeft:1,
                            opacity:0.6,transition:"opacity 0.2s"}}
                            onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.6}>×</span>
                        </div>
                      ))}
                      {isAdding?(
                        <div style={{marginTop:isDesktop?4:2}}>
                          <input autoFocus value={taskInputs[k]||""}
                            onChange={e=>setTaskInputs(p=>({...p,[k]:e.target.value}))}
                            onKeyDown={e=>{if(e.key==="Enter")addTask(k);if(e.key==="Escape")setAddingDay(null);}}
                            placeholder="Task..."
                            style={{width:"100%",fontSize:isDesktop?12:8,border:`1px solid ${C.primary}`,borderRadius:isDesktop?4:3,
                              padding:isDesktop?"5px":"3px",background:C.bg,fontFamily:"inherit",boxSizing:"border-box"}}/>
                          <div style={{display:"flex",gap:isDesktop?4:2,marginTop:isDesktop?4:2}}>
                            <button onClick={()=>addTask(k)} style={{flex:1,background:C.primary,color:"#fff",border:"none",borderRadius:isDesktop?4:2,fontSize:isDesktop?11:7,padding:isDesktop?"4px":"2px",cursor:"pointer"}}>✓</button>
                            <button onClick={()=>setAddingDay(null)} style={{flex:1,background:C.bg,color:C.textLight,border:`1px solid ${C.border}`,borderRadius:isDesktop?4:2,fontSize:isDesktop?11:7,padding:isDesktop?"4px":"2px",cursor:"pointer"}}>✕</button>
                          </div>
                        </div>
                      ):(
                        <button onClick={()=>setAddingDay(k)} style={{background:"none",border:`1px dashed ${C.border}`,
                          color:C.textLight,borderRadius:isDesktop?4:3,fontSize:isDesktop?11:8,padding:isDesktop?"5px 4px":"3px 2px",cursor:"pointer",
                          width:"100%",marginTop:"auto",fontFamily:"inherit"}}>+ add</button>
                      )}
                    </div>
                    {tp&&(
                      <div style={{height:isDesktop?4:3,background:C.checkBg}}>
                        <div style={{height:"100%",width:`${tp.pct}%`,background:C.primary,transition:"width 0.3s"}}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div style={{marginTop:isDesktop?20:12,background:C.white,borderRadius:12,padding:isDesktop?"16px 20px":"12px 14px",boxShadow:`0 2px 8px ${C.cardShadow}`}}>
              <div style={{fontSize:isDesktop?15:12,fontWeight:"bold",color:C.primaryD,marginBottom:isDesktop?12:8}}>Week Summary</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:isDesktop?12:8}}>
                {(()=>{
                  let tot=0,don=0,act=0;
                  wDates.forEach(d=>{const k=dayKey(d);const t=weekTasks[k]||[];if(t.length){act++;tot+=t.length;don+=t.filter(x=>x.done).length;}});
                  const pct=tot?Math.round((don/tot)*100):0;
                  return(<>
                    <div style={{textAlign:"center",background:C.bg,borderRadius:8,padding:isDesktop?"12px 8px":"8px 4px"}}>
                      <div style={{fontSize:isDesktop?24:18,fontWeight:"bold",color:C.primary}}>{act}</div>
                      <div style={{fontSize:isDesktop?11:9,color:C.textLight}}>Days planned</div>
                    </div>
                    <div style={{textAlign:"center",background:C.bg,borderRadius:8,padding:isDesktop?"12px 8px":"8px 4px"}}>
                      <div style={{fontSize:isDesktop?24:18,fontWeight:"bold",color:C.primary}}>{don}/{tot}</div>
                      <div style={{fontSize:isDesktop?11:9,color:C.textLight}}>Tasks done</div>
                    </div>
                    <div style={{textAlign:"center",background:C.bg,borderRadius:8,padding:isDesktop?"12px 8px":"8px 4px"}}>
                      <div style={{fontSize:isDesktop?24:18,fontWeight:"bold",color:pct>=70?C.primary:C.accent}}>{pct}%</div>
                      <div style={{fontSize:isDesktop?11:9,color:C.textLight}}>Completion</div>
                    </div>
                  </>);
                })()}
              </div>
            </div>
          </div>
        )}

        {/* STATS */}
        {tab==="stats" && (
          <div style={{padding:contentPad,maxWidth:contentMaxW,margin:"0 auto",width:"100%"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isDesktop?18:14}}>
              <button onClick={()=>setStatsMonth(p=>{let m=p.m-1,y=p.y;if(m<0){m=11;y--;}return{y,m};})}
                style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:isDesktop?"8px 16px":"6px 12px",cursor:"pointer",fontSize:isDesktop?18:16}}>‹</button>
              <span style={{fontSize:isDesktop?17:13,fontWeight:"bold",color:C.primaryD}}>{MONTHS_F[statsMonth.m]} {statsMonth.y}</span>
              <button onClick={()=>setStatsMonth(p=>{let m=p.m+1,y=p.y;if(m>11){m=0;y++;}return{y,m};})}
                style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:isDesktop?"8px 16px":"6px 12px",cursor:"pointer",fontSize:isDesktop?18:16}}>›</button>
            </div>

            {/* Desktop: side by side ring + heatmap */}
            <div style={{display:isDesktop?"grid":"flex",gridTemplateColumns:isDesktop?"1fr 1fr":undefined,
              flexDirection:isDesktop?undefined:"column",gap:isDesktop?16:0}}>

              {(()=>{
                const md=monthDates(statsMonth.y,statsMonth.m);
                const total=md.length*habits.length;
                const done=md.reduce((a,d)=>a+habits.filter(h=>checked[dayKey(d)]?.[h.id]).length,0);
                const pct=total?Math.round((done/total)*100):0;
                return(
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:isDesktop?0:16,
                    background:C.white,borderRadius:14,padding:isDesktop?24:18,boxShadow:`0 2px 12px ${C.cardShadow}`}}>
                    <Ring pct={pct} size={isDesktop?100:84} stroke={isDesktop?10:9} color={C.primary} bg={C.checkBg}/>
                    <div style={{marginTop:10,fontSize:isDesktop?18:15,fontWeight:"bold",color:C.primaryD}}>{pct}% Monthly</div>
                    <div style={{fontSize:isDesktop?13:11,color:C.textLight}}>{done} / {total} habits completed</div>
                  </div>
                );
              })()}

              <div style={{background:C.white,borderRadius:14,padding:isDesktop?16:12,marginBottom:isDesktop?0:14,boxShadow:`0 2px 12px ${C.cardShadow}`}}>
                <div style={{fontSize:isDesktop?14:12,fontWeight:"bold",color:C.primaryD,marginBottom:isDesktop?10:8}}>Habit Heatmap</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:isDesktop?5:3}}>
                  {["M","T","W","T","F","S","S"].map((d,i)=>(
                    <div key={i} style={{textAlign:"center",fontSize:isDesktop?11:9,color:C.textLight,marginBottom:2}}>{d}</div>
                  ))}
                  {(()=>{
                    const md=monthDates(statsMonth.y,statsMonth.m);
                    const first=(new Date(statsMonth.y,statsMonth.m,1).getDay()+6)%7;
                    const cells=[];
                    for(let i=0;i<first;i++)cells.push(<div key={`e${i}`}/>);
                    md.forEach((d,i)=>{
                      const p=dayProgress(d);
                      const isT=dayKey(d)===dayKey(today);
                      const bg=p.pct===0?C.checkBg:p.pct<40?`${C.primary}30`:p.pct<70?`${C.primary}60`:p.pct<100?`${C.primary}90`:C.primary;
                      cells.push(
                        <div key={i} style={{aspectRatio:"1",borderRadius:isDesktop?4:3,background:bg,display:"flex",
                          alignItems:"center",justifyContent:"center",fontSize:isDesktop?11:8,
                          color:p.pct>=70?"#fff":C.textLight,border:isT?`2px solid ${C.accent}`:"none"}}>
                          {d.getDate()}
                        </div>
                      );
                    });
                    return cells;
                  })()}
                </div>
              </div>
            </div>

            <div style={{background:C.white,borderRadius:14,padding:isDesktop?16:12,marginTop:isDesktop?16:14,boxShadow:`0 2px 12px ${C.cardShadow}`}}>
              <div style={{fontSize:isDesktop?14:12,fontWeight:"bold",color:C.primaryD,marginBottom:isDesktop?14:10}}>Habit Streaks</div>
              <div style={{display:"grid",gridTemplateColumns:isDesktop?"1fr 1fr":"1fr",gap:isDesktop?12:0}}>
                {habits.map(h=>{
                  const s=streak(h.id);
                  const md=monthDates(statsMonth.y,statsMonth.m);
                  const done=md.filter(d=>checked[dayKey(d)]?.[h.id]).length;
                  const pct=Math.round((done/md.length)*100);
                  return(
                    <div key={h.id} style={{marginBottom:isDesktop?0:9}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:isDesktop?13:12,color:C.text}}>{h.emoji} {h.name}</span>
                        <span style={{fontSize:isDesktop?11:10,color:C.accent}}>🔥 {s}d</span>
                      </div>
                      <div style={{height:isDesktop?6:5,background:C.checkBg,borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.primary},${C.primaryL})`,borderRadius:3,transition:"width 0.4s"}}/>
                      </div>
                      <div style={{fontSize:isDesktop?10:9,color:C.textLight,marginTop:1}}>{pct}% this month</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM NAV */}
      <div className="alc-bottom-nav" style={{position:"fixed",bottom:0,left:0,right:0,
        background:C.white,borderTop:`1.5px solid ${C.border}`,
        display:"flex",justifyContent:"center",boxShadow:"0 -4px 20px rgba(0,0,0,0.08)",
        paddingBottom:"env(safe-area-inset-bottom,0px)",transition:"border-color 0.4s"}}>
        <div style={{display:"flex",width:"100%",maxWidth:isDesktop?600:430}}>
          {[{id:"today",label:"Today",icon:"☀️"},{id:"weekly",label:"Weekly",icon:"📅"},{id:"stats",label:"Stats",icon:"📊"}].map(t=>{
            const active=tab===t.id;
            const navC=active?THEMES[t.id].navActive:C.textLight;
            return(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",
                cursor:"pointer",padding:isDesktop?"13px 0 11px":"11px 0 9px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                fontFamily:"inherit",borderTop:active?`3px solid ${THEMES[t.id].navActive}`:"3px solid transparent"}}>
                <span style={{fontSize:isDesktop?22:19}}>{t.icon}</span>
                <span style={{fontSize:isDesktop?12:10,color:navC,fontWeight:active?"bold":"normal",letterSpacing:0.5}}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
